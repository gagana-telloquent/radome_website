{% extends "blog/blog_base.html" %}
{% load static %}

{% block title %}Blog Login{% endblock %}

{% block blog_content %}

<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-purple-50 via-white to-blue-50 px-4">

    <div class="max-w-md w-full">

        <!-- Header -->
        <div class="text-center mb-8">
            <div class="mx-auto h-16 w-16 bg-gradient-to-r from-purple-600 to-blue-600 rounded-full flex items-center justify-center mb-4 shadow-lg">
                <span class="text-white text-2xl font-bold">📝</span>
            </div>

            <h2 class="text-3xl font-bold text-purple-600">
                Blog Dashboard Login
            </h2>

            <p class="mt-2 text-gray-600">
                Sign in to manage blog posts
            </p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 p-8">

            <form method="post" class="space-y-6">
                {% csrf_token %}

                <!-- Username -->
                <div>
                    <label for="username"
                           class="block text-sm font-semibold text-gray-700 mb-2">
                        👤 Username
                    </label>

                    <input type="text"
                           name="username"
                           id="username"
                           required
                           autocomplete="username"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition"
                           placeholder="Enter your username">
                </div>

                <!-- Password -->
                <div>
                    <label for="password"
                           class="block text-sm font-semibold text-gray-700 mb-2">
                        🔒 Password
                    </label>

                    <input type="password"
                           name="password"
                           id="password"
                           required
                           autocomplete="current-password"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 transition"
                           placeholder="Enter your password">
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit"
                            class="w-full bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-700 hover:to-blue-700 text-white font-semibold py-3 rounded-lg transition-all duration-200 shadow-md hover:shadow-lg">
                        Sign In
                    </button>
                </div>
            </form>

            <!-- Footer -->
            <div class="mt-6 text-center text-sm text-gray-500">
                Need access?
                <a href="{% url 'contact' %}"
                   class="text-purple-600 hover:text-purple-700 font-medium">
                    Contact Admin
                </a>
            </div>

        </div>

    </div>

</div>

{% endblock %}
